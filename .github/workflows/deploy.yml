run: |
          # 1. 强制配置 Git 使用标准的 HF 访问令牌认证
          git config --global credential.helper store
          
          # 2. 将凭证动态写入系统
          echo "https://FacingZ:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # 3. 🔥【终极闪避补丁】在云端环境中删掉拦截它的二进制图片文件，并本地悄悄提交
          rm -f apps/storefront/src/app/opengraph-image.jpg
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"
          git commit -am "chore: temporary remove binary images for hf hook bypass" || true
          
          # 4. 锁定精准的 HF 目标仓库路径并强行推流
          git remote add hf https://huggingface.co/spaces/FacingZ/dtcprojects
          git push --force hf main