name: Build and Push Docker to HF Spaces
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Hugging Face Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.hf.space
          username: FacingZ
          password: ${{ secrets.HF_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 强行把打包好的纯净后端镜像，塞进你 HF Space 的底层储存中
          tags: registry.hf.space/facingz-dtcprojects:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max