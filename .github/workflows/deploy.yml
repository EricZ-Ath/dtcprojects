name: Sync to Hugging Face Spaces
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 强制配置 Git 使用标准的 HF 访问令牌认证
          git config --global credential.helper store
          
          # 2. 将凭证动态写入系统
          echo "https://FacingZ:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # 3. 🛠️ 配置 Git 机器人身份
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"
          
          # 4. 🔥【降维打击】在发送给 HF 前，将所有可能含有二进制文件的 apps/storefront 彻底移出 Git 暂存区
          # 既然 HF 只需要 apps/backend 和根目录配置，我们直接在云端把整个前端从历史中“淡化”掉
          git rm -r --cached apps/storefront || true
          
          # 提交这次由于移除前端带来的精简变更（加上 -m 强制通过）
          git commit -m "chore: optimize repo size for hf backend deployment" || true
          
          # 5. 锁定精准的 HF 目标仓库路径并强行推流
          git remote add hf https://huggingface.co/spaces/FacingZ/dtcprojects
          git push --force hf main