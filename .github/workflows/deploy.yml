name: Sync to Hugging Face Spaces
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 强制配置 Git 使用标准的 HF 访问令牌认证
          git config --global credential.helper store
          
          # 2. 将凭证动态写入系统，避开 URL 拼接密码的古老限制
          echo "https://ericz-ath:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # 3. 添加干净的远程仓库地址并强制推流
          git remote add hf https://huggingface.co/spaces/EricZ-Ath/dtc-backend
          git push --force hf main