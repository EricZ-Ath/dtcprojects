name: Sync to Hugging Face Spaces
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 强制配置 Git 使用标准的 HF 访问令牌认证
          git config --global credential.helper store
          
          # 2. 将凭证动态写入系统，使用你在 HF 上的真实用户名 FacingZ
          echo "https://FacingZ:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # 3. 锁定精准的 HF 目标仓库路径并强行推流
          git remote add hf https://huggingface.co/spaces/FacingZ/dtcprojects
          git push --force hf main